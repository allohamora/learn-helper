name: build

on:
  push:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - name: Install dependencies
        run: npm i
      - name: Copy .env file
        run: cp .env.example .env
      - name: Run check
        run: npm run check
      - name: Run build
        run: npm run build
